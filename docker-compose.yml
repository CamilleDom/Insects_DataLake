services:
  minio:
    image: minio/minio:latest
    container_name: insect-lake-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - insect-lake-network

  postgres:
    image: postgis/postgis:15-3.4
    container_name: insect-lake-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insect_pass}
      POSTGRES_DB: ${POSTGRES_DB:-insect_lake}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insect_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insect-lake-network

  airflow-init:
    build:
      context: ./airflow
    container_name: insect-lake-airflow-init
    environment: &airflow-common-env
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: 'false'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-insect_user}:${POSTGRES_PASSWORD:-insect_pass}@postgres:5432/${POSTGRES_DB:-insect_lake}
      MINIO_URL: minio:9000
      MINIO_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-insect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insect_pass}
      POSTGRES_DB: ${POSTGRES_DB:-insect_lake}
      INATURALIST_PLACE_ID: ${INATURALIST_PLACE_ID:-6753}
      INATURALIST_TAXON_ID: ${INATURALIST_TAXON_ID:-47158}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "airflow db upgrade &&
          airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    networks:
      - insect-lake-network

  airflow-webserver:
    build:
      context: ./airflow
    container_name: insect-lake-airflow-webserver
    restart: always
    ports:
      - "8080:8080"
    environment: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    networks:
      - insect-lake-network

  airflow-scheduler:
    build:
      context: ./airflow
    container_name: insect-lake-airflow-scheduler
    restart: always
    environment: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts
      - airflow_logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    networks:
      - insect-lake-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: insect-lake-api
    ports:
      - "8000:8000"
    environment:
      MINIO_URL: minio:9000
      MINIO_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-insect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insect_pass}
      POSTGRES_DB: ${POSTGRES_DB:-insect_lake}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./tests:/tests
      - ./scripts:/scripts
    networks:
      - insect-lake-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  minio_data:
  postgres_data:
  airflow_logs:

networks:
  insect-lake-network:
    driver: bridge